services:
  postgres:
    image: postgres:17
    container_name: looply-postgres
    env_file:
      - .env.local
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Shared by the cache (RedisModule, logical DB 0) and BullMQ queues
  # (QueueModule, logical DB 1) — see AGENTS.md. `noeviction` is required
  # instance-wide (not `allkeys-lru`) because job data on DB 1 must never be
  # silently evicted; the cache's writes already tolerate rejection under
  # memory pressure. Published on the host port because the app runs on the
  # host, not in Docker (same as postgres) — if the app is ever
  # containerized, drop the port publish and use the internal `redis:6379`
  # service name instead.
  redis:
    image: redis:7.4-alpine
    container_name: looply-redis
    env_file:
      - .env.local
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-devpassword}
      --maxmemory 256mb
      --maxmemory-policy noeviction
      --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD --no-auth-warning ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  redisdata: